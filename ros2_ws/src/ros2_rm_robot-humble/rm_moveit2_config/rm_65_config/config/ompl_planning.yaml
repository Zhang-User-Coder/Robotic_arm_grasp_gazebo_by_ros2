# 这里的配置直接抄自大佬，增加了算法的丰富度
planner_configs:
  SBLkConfigDefault:
    type: geometric::SBL
    range: 0.0
  ESTkConfigDefault:
    type: geometric::EST
    range: 0.0
    goal_bias: 0.05
  LBKPIECEkConfigDefault:
    type: geometric::LBKPIECE
    range: 0.0
    border_fraction: 0.9
    min_valid_path_fraction: 0.5
  BKPIECEkConfigDefault:
    type: geometric::BKPIECE
    range: 0.0
    border_fraction: 0.9
    failed_expansion_score_factor: 0.5
    min_valid_path_fraction: 0.5
  KPIECEkConfigDefault:
    type: geometric::KPIECE
    range: 0.0
    goal_bias: 0.05
    border_fraction: 0.9
    failed_expansion_score_factor: 0.5
    min_valid_path_fraction: 0.5
  RRTkConfigDefault: #基础算法
    type: geometric::RRT
    range: 0.0
    goal_bias: 0.05
  RRTConnectkConfigDefault: #纯纯避障算法
    type: geometric::RRTConnect
    range: 0.0
  RRTstarkConfigDefault: #避障+最短
    type: geometric::RRTstar
    range: 0.0
    goal_bias: 0.05
    delay_collision_checking: 1
  BITstarkConfigDefault:  #流行的避障+最短,前提是算力得够
    type: geometric::BITstar
    range: 0.0
    use_k_nearest: true          # 使用 K 近邻搜索
    depth: 64                    # 搜索深度限制
    samples_per_batch: 100       # 每批次采样点数 (核心参数，可根据算力调整)
    rewire_factor: 1.1           # 重连因子 (类似RRTstarkConfigDefault)
    delay_collision_checking: 1  # 延迟碰撞检测
  TRRTkConfigDefault:
    type: geometric::TRRT
    range: 0.0
    goal_bias: 0.05
    max_states_failed: 10
    temp_change_factor: 2.0
    min_temperature: 10e-10
    init_temperature: 10e-6
    frountierNodeRatio: 0.1
    k_constant: 0.0
  PRMkConfigDefault:
    type: geometric::PRM
    max_nearest_neighbors: 10
  PRMstarkConfigDefault:
    type: geometric::PRMstar

# ============================================================
# 关键修改：把 ur_manipulator 改成 rm_group
# ============================================================
rm_group:
  default_planner_config: BITstarkConfigDefault
  planner_configs:
    - SBLkConfigDefault
    - ESTkConfigDefault
    - LBKPIECEkConfigDefault
    - BKPIECEkConfigDefault
    - KPIECEkConfigDefault
    - RRTkConfigDefault
    - RRTConnectkConfigDefault
    - RRTstarkConfigDefault
    - BITstarkConfigDefault
    - TRRTkConfigDefault
    - PRMkConfigDefault
    - PRMstarkConfigDefault

  longest_valid_segment_fraction: 0.01
  projection_evaluator: joints(joint1,joint2)

# 加上夹爪组，防止夹爪规划报错
gripper_group:
  default_planner_config: RRTConnectkConfigDefault
  planner_configs:
    - RRTConnectkConfigDefault